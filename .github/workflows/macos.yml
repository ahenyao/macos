name: macOS Tailscale Access

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:

      - name: Create user with dscl
        run: |
          USERNAME="${{ secrets.MACOS_USER }}"
          PASSWORD="${{ secrets.MACOS_PASS }}"

          # find free UID (>1000)
          USER_ID=$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -1)
          USER_ID=$((USER_ID+1))

          echo "Using UID: $USER_ID"

          sudo dscl . -create /Users/$USERNAME
          sudo dscl . -create /Users/$USERNAME UserShell /bin/bash
          sudo dscl . -create /Users/$USERNAME RealName "$USERNAME"
          sudo dscl . -create /Users/$USERNAME UniqueID $USER_ID
          sudo dscl . -create /Users/$USERNAME PrimaryGroupID 20
          sudo dscl . -create /Users/$USERNAME NFSHomeDirectory /Users/$USERNAME

          sudo dscl . -passwd /Users/$USERNAME "$PASSWORD"

          sudo createhomedir -c -u $USERNAME > /dev/null

          sudo dscl . -append /Groups/admin GroupMembership "${{ secrets.MACOS_USER }}"
    
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled &
          sleep 5

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --hostname=github-macos

      - name: Show Tailscale IP
        run: tailscale ip -4

      - name: Enable SSH (optional)
        run: |
          sudo systemsetup -setremotelogin on
          echo "SSH enabled"

      - name: Keep runner alive
        run: sleep 3600
