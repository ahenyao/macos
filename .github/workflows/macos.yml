name: macOS Tailscale Access

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled &
          sleep 5

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --hostname=github-macos

      - name: Show Tailscale IP
        run: tailscale ip -4

      - name: Enable SSH (optional)
        run: |
          sudo systemsetup -setremotelogin on
          echo "SSH enabled"

      - name: Keep runner alive
        run: sleep 3600
